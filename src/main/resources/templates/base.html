<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title,content)">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css"
    rel="stylesheet"
/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title th:replace="${title}">Base html</title>
  </head>
  <body>
    <!-- Navbar section start -->
    <div class="navbar-section-body">
      <nav class="shadow p-1 fixed-top mb-0 navbar navbar-expand-lg navbar-light bg-light  border-bottom border-1 border-dark">
        <div class="container-fluid">
          <a class="navbar-brand fs-3 ms-5" th:href="@{/}"><img th:src="@{/img/logo1.png}" alt="">AROMA</a>
          <button class="navbar-toggler text-center" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/}">Home</a>
              </li>
              <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/products}">Products</a>
              </li>
              <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/brands}">Brands</a>
              </li>
              <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/contact}">Contact Us</a>
              </li>
              <!-- <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/user/cart}">Cart</a>
              </li> -->
            </ul>
            <th:block th:if="${user==NULL}">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/user/login}"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
              </li>
              <li class="nav-item m-2">
                <a class="nav-link active fs-5" aria-current="page" th:href="@{/user/register}"><i class="fa-solid fa-cart-shopping"></i> Signup</a>
              </li>
            </ul>
          </th:block>
          <th:block th:if="${user!=NULL}">
            <!-- Example split danger button -->
<!-- <ul class="navbar-nav ms-auto mb-2 mb-lg-0 dropdown-menu">
  <li class="nav-item m-2">
    <a class="dropdown-item text-dark" href="#"><i class="fa fa-key" aria-hidden="true"></i> Change Password </a>
  </li>
  <li><hr class="dropdown-divider"></li>
  <li class="nav-item m-2">
    <a class="dropdown-item text-dark" href="#"><i class="fa fa-sign-out" aria-hidden="true"></i> Logout </a>
  </li>
</ul> -->

<div class="dropdown ms-auto pe-5 d-flex">
  <li class="nav-item m-2">
    <a class="nav-link active fs-5" aria-current="page" th:href="@{/user/cart}">Cart</a>
  </li>
  <button class="btn btn-info dropdown-toggle fw-bold m-3" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">Profile
  </button>
  <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
    <li><a class="dropdown-item text-dark" href="#"><i class="fa fa-key" aria-hidden="true"></i> Change Password </a></li>
    <li><a class="dropdown-item text-dark" href="#"><i class="fa fa-sign-out" aria-hidden="true"></i> Logout </a></li>
  </ul>
</div>
          </th:block>

          </div>
        </div>
      </nav>
      <!-- Navbar section end -->
    </div>

    <div class="replace-section" th:replace="${content}"></div>

    <footer id="footer-section" class="container-fluid pt-2">
      <div class="row">
        <div class="col col-md-3 text-light d-flex align-items-center justify-content-center">
          <div class="container-fluid d-flex flex-column align-items-center">
            <a class="navbar-brand" href="#"><img id="footer-logo" th:src="@{/img/logo1.png}" alt=""></a>
            <h3 class="navbar-brand fs-3">AROMA</h3>
          </div>
        </div>
        <div class="col col-md-2 text-light">
<div class="container-fluid mt-4 d-flex flex-column align-items-center justify-content-center">
  <a class="a-scale" href="#">Home</a>
  <a class="a-scale" href="#">Products</a>
  <a class="a-scale" href="#">Top Brands</a>
  <a class="a-scale" href="#">contact</a>
  <a class="a-scale" href="#">About Us</a>
</div>
        </div>
        <div class="col col-md-2 text-light">
<div class="container-fluid mt-4 d-flex flex-column justify-content-center">
  <h6 class="fs-3">Socials</h6>
  <a class="a-scale" href="#"><i class="fa-brands fa-github"></i> GitHub</a>
  <a class="a-scale" href="#"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
  <a class="a-scale" href="#"><i class="fa-brands fa-instagram"></i> Instagram</a>
  <a class="a-scale" href="#"><i class="fa-brands fa-twitter"></i> Twitter</a>
</div>
        </div>
        <div class="col col-md-3 text-light">
        <form action="@{/contact-form}" method="post">
          <div class="mb-2">
            <label for="exampleFormControlInput1" class="form-label">Email</label>
            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Email" required>
          </div>
          <div class="mb-2">
            <label for="exampleFormControlTextarea1" class="form-label">Comment</label>
            <textarea class="bg-red form-control" required id="exampleFormControlTextarea1" placeholder="Comment" rows="3"></textarea>
          </div>
          <div class="mx-0 mt-2 contact-form-submit-btn rounded">
            <button class="btn w-100" type="submit">Submit</button>
          </div>
        </form>
        </div>
        <hr class="text-light">
          <div class="container-icons d-flex justify-content-center">
            <ul id="ul-icons">
              <li><a href="#"><i class="fa-brands fa-github"></i></a></li>
              <li><a href="#"><i class="fa-brands fa-linkedin"></i></a></li>
              <li><a href="#"><i class="fa-brands fa-instagram"></i></a></li>
              <li><a href="#"><i class="fa-brands fa-youtube"></i></a></li>
              <li><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
            </ul>
          </div>
        </div>
      </div>
      <div class="last-div">
        <h6 class="text-light text-center m-0 pb-5">© 2024 Google.com All rights reserved.</h6>
      </div>
    </footer>

    <!-- Optional JavaScript; choose one of the two! -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
    

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <script th:src="@{/js/index.js}"></script>
