<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::title},~{::section})}">
  <head>
    <title>Login Page</title>
  </head>
  <body>
   <section>
<div class="contact-container" style="height: 70vh;" >
    <div class="jumbotron text-center mb-5">
        <h1 class="display-4">Welcome back, Admin</h1>
        <p>Easily manage your data from this admin <mark>CMS</mark></p>
    </div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-3 pt-3" >
                <div class="card" style="background-color:white;">
                    <div class="card-body">
                        <h4 class="card-title">Categories</h4>
                        <p class="card-text">Manage the categories here.</p>
                        <a href="#" th:href="@{/admin/categories}" class="card-link btn btn-primary">Manage</a>
    
                    </div>
                </div>
            </div>
            <div class="col-sm-3 pt-3" >
                <div class="card" style="background-color:white;">
                    <div class="card-body">
                        <h4 class="card-title">Products</h4>
                        <p class="card-text">Manage all the products here.</p>
                        <a href="#" th:href="@{/admin/products}" class="card-link btn btn-primary">Manage</a>
    
                    </div>
                </div>
            </div>
            <div class="col-sm-3 pt-3" >
                <div class="card" style="background-color:white;">
                    <div class="card-body">
                        <h4 class="card-title">Users</h4>
                        <p class="card-text">Manage all the users section here.</p>
                        <a href="#" th:href="@{/admin/users}" class="card-link btn btn-primary">Manage</a>
    
                    </div>
                </div>
            </div>
    
        </div>
    </div>
</div>
   </section>
  </body>
</html>
