<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::title},~{::section})}">
  <head>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Register Page</title>    
  </head>
  <body>
   <section>
    <div class="container mt-5">
        <div class="row  pt-5">
            <div class="col-md-4">
                <div class="card shadow  mb-5 bg-body rounded">
                    <div class="card-header text-center fs-3">REGISTER</div>
                    <div class="card-body">
                        <form action="" th:method="post">
                            <div class="mb-2">
                                <label for="">Full Name</label>
                                <input type="text" name="fullName" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label for="">Username</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label for="">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label for="">Password</label>
                                <input type="password" id="pass1" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="">Confirm Password</label>
                                <input type="password" id="pass2" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="btn-w rounded-0 btn btn-success col-md-12">REGISTER NOW</button>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label for="">Already have an account?</label>
                                <a class="text-primary" th:href="@{/login}">Login now</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
   </section>
  </body>
</html>
